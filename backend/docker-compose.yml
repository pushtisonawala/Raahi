services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: raahi
      POSTGRES_PASSWORD: raahi_dev
      POSTGRES_DB: raahi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raahi -d raahi"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://raahi:raahi_dev@postgres:5432/raahi?sslmode=disable
      JWT_SECRET: some-long-random-string-change-this-later
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: